<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to JAV-Streaming</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f0f0f;
      font-family:Arial, sans-serif;
      overflow:hidden;
    }

    .bg{
      position:absolute;
      width:100%;
      height:100%;
      background:
        radial-gradient(circle at top left, #ff0055 0%, transparent 30%),
        radial-gradient(circle at bottom right, #6600ff 0%, transparent 30%);
      filter:blur(80px);
      opacity:0.6;
    }

    .container{
      position:relative;
      text-align:center;
      z-index:2;
      padding:40px;
    }

    h1{
      font-size:70px;
      color:white;
      letter-spacing:2px;
      margin-bottom:20px;
      text-shadow:0 0 20px rgba(255,255,255,0.3);
    }

    p{
      color:#cfcfcf;
      font-size:20px;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      border-radius:50px;
      text-decoration:none;
      background:#ffffff;
      color:#111;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.08);
      background:#ff0055;
      color:white;
      box-shadow:0 0 25px #ff0055;
    }

    @media(max-width:768px){
      h1{
        font-size:42px;
      }

      p{
        font-size:16px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>

  <div class="container">
    <h1>WELCOME TO JAV-STREAMING</h1>
    <p>Unlimited streaming experience starts here.</p>

    <a href="https://gist.github.com/jav-streaming" class="btn">ENTER SITE</a>
  </div>

</body>
</html>
